<html lang="en">
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in or up</title>
    <link rel="stylesheet" href="../maincss.css">

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>

	<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-database-compat.js"></script>

  authDomain: "johnnyairlinescouk.firebaseapp.com",
  databaseURL: "https://johnnyairlinescouk-default-rtdb.europe-west1.firebasedatabase.app",

    <style>
        form {
            text-align:center;
            position: absolute;
            left: 50%;
			top: 50%;
            transform : translate(-50%,-50%);
            width: fit-content;
            padding: 40px;
            background-color: #00FF72;
            border: 10px solid black;
        }
        input[type="password"], input[type="text"], input[type="submit"] {
            background-color: white;
            color: black;
            font-size: 20px;
            margin: 5px;
			border-radius: 0px;
			border: 2px solid black;
        }
        .form-control {
          font-family: system-ui, sans-serif;
          font-size: 20px;
          font-weight: bold;
          line-height: 1.1;
          gap: 0.5em;
        }
        label {
            width: fit-content;
            margin: auto;
        }
        input[type="radio"] {
          -webkit-appearance: none;
          appearance: none;
          background-color: white;
          margin: 0;
          font: inherit;
          width: 1.15em;
          height: 1.15em;
          border: 0.15em solid white;
          border-radius: 10%;
        }

        input[type="radio"]:checked {
			background-color: black;
        }
    </style>
</head>
<body>
    <div class="logo"><a href="/"><img src="/LOGO.png" class="logoI" alt="Johnny Airlines Logo"></a></div>
    <form action="" id="loginForm" autocomplete="off">
        <div class="radio">
    		<input type="radio" id="signIn" name="authMethod" value="signIn" checked>
        	<label type="text" class="form-control" for="signIn">Sign in</label>
        	<input type="radio" id="signUp" name="authMethod" value="signUp"/>
			<label type="text" class="form-control" for="signUp">Sign up</label>
        </div>
        <br>
        <input type="text" id="eMail" name="eMail" autocomplete="username"><br>
        <input type="password" id="password" name="password" autocomplete="current-password"><br>
        <input type="submit" value="Submit">
    </form>
    <script type="text/javascript">
    function signIn(email,password) {
        firebase.auth().signInWithEmailAndPassword(email, password)
            .then((userCredential) => {
                // Signed in 
                var user = userCredential.user;
                console.info("Success");
                location.replace("/quiz/")
            })
            .catch((error) => {
                var errorCode = error.code;
                var errorMessage = error.message;
                alert("Something went wrong. Perhaps you meant to sign up or you account details are wrong.")
            });
    }

    function signUp(email,password) {
        firebase.auth().createUserWithEmailAndPassword(email, password)
            .then((userCredential) => {
                // Signed in 
				console.info("Success");
                var user = userCredential.user;
				console.log(user)
				console.log(user.email)
				console.log(user.uid)
				user.updateProfile({
					displayName: user.email.replace('@johnny-airlines.co.uk',""),
					photoURL: "https://johnny-airlines.co.uk/Plane.png",
				}).then(()=> {
				firebase.database().ref(`users/${user.uid}`).set({
					tickets: 0,
					username: user.email.replace("@johnny-airlines.co.uk",""),
					ownedPlanes: ["Plane"],
					fuel: 100
				}).then(() => {
					location.replace("/update")
				})
				})
            })
            .catch((error) => {
                var errorCode = error.code;
                var errorMessage = error.message;
                alert("Something went wrong. Perhaps you meant to sign in or you account details are wrong.")
            });
    }

    let loginForm = document.getElementById("loginForm");
    loginForm.addEventListener("submit", (e) => {
        e.preventDefault();

        let eMail = document.getElementById("eMail").value + "@johnny-airlines.co.uk";
        let password = document.getElementById("password").value;
        let sin = document.getElementById("signIn").checked;
        let sup = document.getElementById("signUp").checked;

        if (sin) {
            signIn(eMail, password);
        }
        else if (sup) {
            signUp(eMail, password);
		}
    });
    </script>
</body>
</html>
